name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - staging
          - production
      ref:
        description: "Git ref to deploy (branch, tag, or SHA)"
        required: false
        type: string
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}-backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}-frontend

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker image tags
        id: tags
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "backend_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "frontend_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "backend_latest=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest" >> $GITHUB_OUTPUT
          echo "frontend_latest=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest" >> $GITHUB_OUTPUT

      - name: Build & push backend image
        run: |
          docker build \
            -t ${{ steps.tags.outputs.backend_tag }} \
            -t ${{ steps.tags.outputs.backend_latest }} \
            -f backend/Dockerfile \
            --target production \
            backend/
          docker push --all-tags ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}

      - name: Build & push frontend image
        run: |
          docker build \
            -t ${{ steps.tags.outputs.frontend_tag }} \
            -t ${{ steps.tags.outputs.frontend_latest }} \
            -f frontend/Dockerfile \
            frontend/
          docker push --all-tags ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}

      - name: Deploy to target environment
        run: |
          echo "Deploying ${{ steps.tags.outputs.backend_tag }} and ${{ steps.tags.outputs.frontend_tag }} to ${{ github.event.inputs.environment }}"
          echo "Add your deployment command here:"
          echo "  e.g., kubectl set image, ssh deploy script, Render API call, etc."
